<svg viewBox="0 0 400 480" fill="none" xmlns="http://www.w3.org/2000/svg" class="india-svg">
            <!-- Simplified India silhouette -->
            <path d="M180 20 L200 18 L230 25 L260 35 L280 50 L295 70 L300 95 L295 115 L310 130 L325 150 L330 175 L325 200 L315 220 L320 245 L310 270 L295 290 L285 315 L270 335 L255 355 L240 375 L225 395 L215 415 L210 435 L200 455 L190 435 L185 415 L175 395 L165 380 L155 360 L145 340 L135 315 L125 295 L115 270 L110 245 L115 220 L105 200 L100 175 L105 150 L115 130 L110 110 L105 90 L115 70 L130 55 L150 40 L165 28 Z" fill="#E8F0FF" stroke="#0054C4" stroke-width="1.5"/>
            <!-- State borders suggestion -->
            <path d="M150 150 L250 155 M155 200 L245 205 M140 250 L260 255 M150 300 L250 305" stroke="#0054C4" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
            <!-- City dots -->
            <!-- Bengaluru -->
            <circle cx="190" cy="340" r="7" fill="#0054C4"/>
            <circle cx="190" cy="340" r="14" fill="#0054C4" opacity="0.2">
              <animate attributeName="r" from="7" to="20" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>
            </circle>
            <text x="202" y="344" font-family="DM Sans, sans-serif" font-size="10" fill="#0054C4" font-weight="700">Bengaluru</text>
            <!-- Mumbai -->
            <circle cx="145" cy="270" r="7" fill="#0054C4"/>
            <circle cx="145" cy="270" r="14" fill="#0054C4" opacity="0.2">
              <animate attributeName="r" from="7" to="20" dur="2.3s" repeatCount="indefinite"/>
              <animate attributeName="opacity" from="0.4" to="0" dur="2.3s" repeatCount="indefinite"/>
            </circle>
            <text x="158" y="274" font-family="DM Sans, sans-serif" font-size="10" fill="#0054C4" font-weight="700">Mumbai</text>
            <!-- Delhi -->
            <circle cx="185" cy="130" r="7" fill="#0054C4"/>
            <circle cx="185" cy="130" r="14" fill="#0054C4" opacity="0.2">
              <animate attributeName="r" from="7" to="20" dur="1.8s" repeatCount="indefinite"/>
              <animate attributeName="opacity" from="0.4" to="0" dur="1.8s" repeatCount="indefinite"/>
            </circle>
            <text x="197" y="134" font-family="DM Sans, sans-serif" font-size="10" fill="#0054C4" font-weight="700">Delhi</text>
            <!-- Hyderabad -->
            <circle cx="205" cy="300" r="6" fill="#0054C4"/>
            <text x="215" y="304" font-family="DM Sans, sans-serif" font-size="9" fill="#0054C4" font-weight="600">Hyderabad</text>
            <!-- Chennai -->
            <circle cx="215" cy="360" r="6" fill="#0054C4"/>
            <text x="225" y="364" font-family="DM Sans, sans-serif" font-size="9" fill="#0054C4" font-weight="600">Chennai</text>
            <!-- Pune -->
            <circle cx="158" cy="285" r="5" fill="#0054C4" opacity="0.8"/>
            <!-- Kolkata -->
            <circle cx="265" cy="220" r="6" fill="#0054C4"/>
            <text x="274" y="224" font-family="DM Sans, sans-serif" font-size="9" fill="#0054C4" font-weight="600">Kolkata</text>
            <!-- Ahmedabad -->
            <circle cx="148" cy="210" r="5" fill="#0054C4" opacity="0.8"/>
            <!-- Route lines -->
            <path d="M185 130 L145 270 L158 285 L145 270 L190 340 L215 360 M190 340 L205 300 M265 220 L205 300" stroke="#0054C4" stroke-width="1" stroke-dasharray="5,3" opacity="0.25"/>
          </svg>